name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: '--allowedTools "Bash(gh:*),Read,Grep,Glob"'
          prompt: |
            Run `gh pr diff ${{ github.event.pull_request.number }}` to read this PR's diff,
            then use the qa-review skill to perform a QA review of it.
            Post the full review as ONE PR comment by running:
            gh pr comment ${{ github.event.pull_request.number }} --body "REVIEW_TEXT"
