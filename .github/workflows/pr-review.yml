name: PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  qa-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash -s -- 2.1.183

      - name: Write Claude credentials
        run: |
          mkdir -p ~/.claude
          printf '{"claudeAiOauth":{"accessToken":"%s","expiresAt":9999999999}}' \
            "$CLAUDE_CODE_OAUTH_TOKEN" > ~/.claude/.credentials.json
          chmod 600 ~/.claude/.credentials.json
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: QA review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          echo "=== claude version ==="
          claude --version

          echo "=== auth status ==="
          claude auth status 2>&1 || true

          echo "=== fetching diff ==="
          gh pr diff "$PR_NUMBER" > /tmp/pr-diff.txt
          echo "diff: $(wc -l < /tmp/pr-diff.txt) lines"

          echo "=== building prompt ==="
          {
            printf 'You are a QA engineer reviewing a pull request. Write a structured review.\n\n'
            printf '## Test Cases to Verify\nNumbered list of specific scenarios to test.\n\n'
            printf '## Potential Issues\nBugs or edge cases in the diff. If none, write "None identified."\n\n'
            printf '## Risk Assessment\nSeverity (Critical/Major/Minor/Trivial) and one-sentence reason.\n\n'
            printf 'Write in direct, active voice.\n\nDiff:\n'
            cat /tmp/pr-diff.txt
          } > /tmp/prompt.txt
          echo "prompt: $(wc -c < /tmp/prompt.txt) bytes"

          echo "=== running claude -p ==="
          set +e
          claude -p --output-format text "$(cat /tmp/prompt.txt)" > /tmp/review.txt 2>/tmp/claude-err.txt
          CLAUDE_EXIT=$?
          echo "claude exit code: $CLAUDE_EXIT"
          echo "--- stdout ---"
          cat /tmp/review.txt
          echo "--- stderr ---"
          cat /tmp/claude-err.txt
          set -e

          if [ $CLAUDE_EXIT -ne 0 ]; then
            echo "claude -p failed, check stderr above"
            exit 1
          fi

          echo "=== posting comment ==="
          gh pr comment "$PR_NUMBER" --body "$(cat /tmp/review.txt)"
          echo "=== done ==="